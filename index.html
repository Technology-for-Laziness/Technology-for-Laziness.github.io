<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>언어 선택 | Technology for Laziness</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
    <style>
        /* 기본 스타일 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            padding: 0 4vw;
        }
        hr {
            border: 0;
            height: 1px;
            background: #e0e0e0;
            margin: 20px 0;
        }

        /* 상단 네비게이션 */
        .nav {
            display: flex;
            align-items: center; 
            padding: 20px 0;
        }
        #logo {
            font-size: 1.4rem;
            font-weight: bold;
        }
        .sections {
            margin-left: auto;
            display: flex;
            gap: 2.5vw;
        }
        .sections p {
            cursor: pointer;
            font-weight: 500;
        }
        .sections p:hover {
            color: #467427;
        }

        /* 중앙 언어 선택 섹션 */
        .lang-select-container {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .notice-sel {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .sel-lang {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        /* 깔끔한 텍스트 링크 스타일링 */
        .sel-lang a {
            font-size: 1.5rem;
            font-weight: 500;
            color: #333;
            text-decoration: none;
            position: relative;
            padding: 4px 0;
            transition: color 0.2s ease;
        }
        .sel-lang a:hover {
            color: #467427;
        }
        /* 밑줄 애니메이션 효과 생성 */
        .sel-lang a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #467427;
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }
        .sel-lang a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* 텍스트 줄바꿈 공통 처리 */
        p, a {
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        /* 하단 푸터 영역 */
        .notice {
            display: flex;
            align-items: center; 
            justify-content: space-between;
            padding: 15px 0;
            font-size: 0.9rem;
        }
        .notice a {
            color: #555;
            text-decoration: none;
        }
        .notice a:hover {
            text-decoration: underline;
        }
        .lang {
            gap: 10px;
            display: flex;
            align-items: center; 
        }
        .lisence {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 30px;
        }

        /* 📱 모바일 반응형 디자인 수정 (화면 폭 768px 이하) */
        @media (max-width: 768px) {
            body {
                padding: 0 5vw; /* 모바일에서 조금 더 안정적인 양쪽 여백 */
            }
            .nav {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .sections {
                margin-left: 0;
                gap: 5vw;
                width: 100%;
                justify-content: center;
            }
            .lang-select-container {
                height: auto;
                min-height: 35vh; /* 고정 높이 해제하여 모바일 글자 겹침 방지 */
                padding: 40px 0;
            }
            .notice-sel {
                font-size: 1.6rem;
                width: 100%;
                margin-bottom: 30px;
            }
            .sel-lang {
                width: 100%;
                gap: 20px;
            }
            .sel-lang a {
                font-size: 1.3rem;
                display: inline-block;
                width: max-content; /* 밑줄 길이가 글자 크기에 딱 맞도록 설정 */
                margin: 0 auto;
            }
            .notice {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            .lang {
                justify-content: center;
            }
            .lisence {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- 상단 네비게이션 -->
    <div class="nav">
        <p id="logo">Technology for Laziness</p>
        <div class="sections">
            <p>Our Research</p>
            <p>Research Philosophy</p>
            <p>Notice</p>
        </div>
    </div>
    
    <hr>

    <!-- 언어 선택 영역 -->
    <div class="lang-select-container">
        <p class="notice-sel">Please Select Language</p>
        <div class="sel-lang">
            <a href="/ko/">한국어</a>
            <a href="/en/">English</a>
        </div>
    </div>
    
    <hr>

    <!-- 하단 푸터 -->
    <div class="notice">
        <p class="copyrights">© 2026 Technology for Laziness. All rights reserved.</p>
        <div class="lang">
            <a href="/ko/">한국어</a>
            <p>|</p>
            <a href="/en/">English</a>
        </div>
    </div>
    <p class="lisence">본 재단은 과학기술정보통신부 재원으로 한국지능정보사회진흥원(NIA)의 지원을 받아 구축된 AI-HUB 데이터를 활용하였습니다.</p>
</body>
<script>
    // 1. 사용자의 브라우저 언어 감지 (앞 두 글자만 추출, 예: 'ko-KR' -> 'ko')
    const userLang = (navigator.language || navigator.userLanguage).substring(0, 2);

    // 2. 언어별 자동 리다이렉트 처리
    if (userLang === 'ko') {
        window.location.href = '/ko/'; // 한국어 사용자는 국문 메인으로 이동
    } else {
        window.location.href = '/en/'; // 그 외 모든 외국어 사용자는 영문 메인으로 이동
    }
</script>

</html>
